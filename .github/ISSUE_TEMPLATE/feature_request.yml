name: Feature request
description: Suggest an idea to improve synapse-orchestrator.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any alternative approaches.
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Share links, examples, or related issues.
    validations:
      required: false
